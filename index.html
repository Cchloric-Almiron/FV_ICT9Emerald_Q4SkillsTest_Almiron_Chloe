

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background-image:url(https://i.pinimg.com/736x/24/cb/ea/24cbeab89f9ad4d593f5f3e8f6dfbc73.jpg);
        background-repeat:no-repeat;
        background-size:cover;
        }

        #logbox{
        background-color:rgba(255, 255, 255, 0.546);
        font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        text-align:center;
        width:400px;
        height:550px;
        margin-top:40px;
        border: 1px solid rgba(255, 255, 255, 0.491)
        }

        #user{
        width:300px;


        }



    </style>
</head>
<body>

    <center>
    <div id="logbox">
    <form>
        <h2>Login Form</h2>
        <label for="user">Username</label>
            <br>
            <input type="text" id="user" class="form-control" placeholder="Enter your Username" required>
            <br>  


        <label for="pass">Password</label>
            <br>
            <input type="password" id="pass" class="form-control" placeholder="Enter your Password" required>
            <br> 
        
        <p id="display"></p>


        <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">


         <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-info rounded-5" >
    </form>
    </div>
</center>

    <script>
        let attempt_counter = 0;


        function authenticate(){
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";


        while (attempt_counter < 3) {
        if (username === "mrbeast67" && pwd === "12345678") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "index.html";


            break; // stop loop
        }


        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }


        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
            }
        }
    </script>
    
</body>
</html>
